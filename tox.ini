[tox]
envlist = py38,py39,py310,py311,py312,py313,py314,pypy38,pypy39,pypy310,pypy311

[testenv]
allowlist_externals = sh
deps = pytest
       pytest-cov
       flake8
       mypy
commands = pytest --cov=pychoir tests
           sh -c 'python -m doctest pychoir/[!_]*.py'
           flake8 pychoir tests
           mypy pychoir tests

[testenv:pypy{36,37,39,310}]
allowlist_externals = sh
deps = pytest
       pytest-cov
       flake8
commands = pytest --cov=pychoir tests
           sh -c 'python -m doctest pychoir/[!_]*.py'
           flake8 pychoir tests
